name: mobileproxy build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 1.22

      - run: |
          go install golang.org/x/mobile/cmd/gomobile@latest
          go install golang.org/x/mobile/cmd/gobind@latest
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile init

      - run: git clone https://github.com/OutlineFoundation/outline-sdk.git

      - run: |
          cd outline-sdk/x
          export PATH=$PATH:$(go env GOPATH)/bin
          gomobile bind -target=android -androidapi=21 -o mobileproxy.aar github.com/OutlineFoundation/outline-sdk/x/mobileproxy

      - uses: actions/upload-artifact@v4
        with:
          name: mobileproxy
          path: outline-sdk/x/mobileproxy.aar
